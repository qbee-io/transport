name: tests
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.2

      - name: go test
        run: go test ./...

      - id: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: 1.26.2
          go-package: ./...

      - name: golint
        run: go run golang.org/x/lint/golint@latest ./...

      - name: govet
        run: go vet ./...
